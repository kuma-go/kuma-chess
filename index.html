    <script id="kuma-adsense-script" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7173992156420612" crossorigin="anonymous"></script>
    <style>
      @font-face {
        font-family: "Pretendard";
        src: url("./assets/fonts/PretendardVariable.ttf") format("truetype");
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
      }
      @font-face {
        font-family: "Noto Serif KR";
        src: url("./assets/fonts/NotoSerifKR-Variable.ttf") format("truetype");
        font-style: normal;
        font-weight: 200 900;
        font-display: swap;
      }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #EDDEC1;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      body { position: fixed; inset: 0; isolation: isolate; }
      :root {
        --kuma-ad-height: 0px;
        --kuma-vw: 100vw;
        --kuma-vh: 100vh;
        --kuma-vv-left: 0px;
        --kuma-vv-top: 0px;
      }
      body.ad-visible { --kuma-ad-height: clamp(50px, 9dvh, 90px); }
      #ambient-background {
        position: fixed;
        left: var(--kuma-vv-left);
        top: var(--kuma-vv-top);
        width: var(--kuma-vw);
        height: var(--kuma-vh);
        overflow: hidden;
        pointer-events: none;
        background: #EDDEC1;
        z-index: 0;
      }
      #ambient-bottom {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: min(400px, 10.65vw);
        background: url("./assets/kuma/ui/pattern_bottom_bg.png") center bottom / 100% 100% no-repeat;
      }
      #ambient-pattern {
        position: absolute;
        inset: -18vmax;
        transform: rotate(-6deg);
        transform-origin: center;
      }
      #ambient-pattern::before {
        content: "";
        position: absolute;
        inset: -420px;
        background: url("./assets/kuma/ui/pattern.png") 0 0 / 420px 420px repeat;
        animation: kuma-pattern-drift 600s linear infinite;
        will-change: transform;
      }
      @keyframes kuma-pattern-drift {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(420px, 420px, 0); }
      }
      @media (prefers-reduced-motion: reduce) {
        #ambient-pattern::before { animation: none; will-change: auto; }
      }
      #ad-shell {
        position: fixed;
        left: calc(var(--kuma-vv-left) + env(safe-area-inset-left, 0px));
        top: calc(var(--kuma-vv-top) + env(safe-area-inset-top, 0px));
        width: calc(var(--kuma-vw) - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
        height: var(--kuma-ad-height);
        display: none;
        align-items: center;
        justify-content: center;
        background: #fff8ea;
        border-bottom: 1px solid rgba(189, 161, 127, 0.35);
        z-index: 20;
        overflow: hidden;
      }
      body.ad-visible #ad-shell { display: flex; }
      #ad-shell .adsbygoogle { width: min(100%, 720px); height: 100%; }
      #game-viewport {
        position: fixed;
        left: var(--kuma-vv-left);
        top: var(--kuma-vv-top);
        width: var(--kuma-vw);
        height: var(--kuma-vh);
        box-sizing: border-box;
        padding-top: calc(env(safe-area-inset-top, 0px) + var(--kuma-ad-height));
        padding-right: env(safe-area-inset-right, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        overflow: hidden;
        background: transparent;
        z-index: 1;
      }
      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: transparent;
      }
      canvas {
        display: block;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="ambient-background" aria-hidden="true">
      <div id="ambient-bottom"></div>
      <div id="ambient-pattern"></div>
    </div>
    <aside id="ad-shell" aria-label="광고" hidden></aside>
    <main id="game-viewport">
      <div id="game-container"></div>
    </main>
