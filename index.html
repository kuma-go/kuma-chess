<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#fff8ea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KUMA CHESS" />
    <meta name="format-detection" content="telephone=no" />
    <title>KUMA CHESS</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png" />
    <link rel="preload" href="./assets/fonts/PretendardVariable.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="./assets/fonts/NotoSerifKR-Variable.ttf" as="font" type="font/ttf" crossorigin />
    <style>
      @font-face {
        font-family: "Pretendard";
        src: url("./assets/fonts/PretendardVariable.ttf") format("truetype");
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
      }
      @font-face {
        font-family: "Noto Serif KR";
        src: url("./assets/fonts/NotoSerifKR-Variable.ttf") format("truetype");
        font-style: normal;
        font-weight: 200 900;
        font-display: swap;
      }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game-container {
        width: 100vw; height: 100vh;
        width: 100dvw; height: 100dvh;
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        display: flex; align-items: center; justify-content: center;
      }
      canvas {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>

    <!-- Phaser (local) -->
    <script src="./phaser.js"></script>
    <!-- Main -->
    <script type="module" src="./src/main.js?v=20260714-layout22"></script>
    <script>
      if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
      }
    </script>
  </body>
</html>
